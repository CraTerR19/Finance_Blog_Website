<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | FinVerse</title>
  <link rel="stylesheet" href="styles.css?v=3">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .admin-container {
      max-width: 800px;
      margin: 80px auto;
      padding: 0 1.5rem;
    }
    .auth-section {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 2rem;
    }
    .subscribers-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.5rem;
    }
    .subscribers-table th, .subscribers-table td {
      padding: 1.2rem 1.5rem;
      text-align: left;
      border-bottom: 1px solid var(--glass-border);
    }
    .subscribers-table th {
      color: var(--secondary-color);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .subscribers-table td {
      color: var(--text-primary);
      font-size: 1rem;
    }
    .subscribers-table tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="brand" style="display: flex; align-items: center; gap: 15px;">
      <div class="logo-wrapper"></div>
      Fin<span>Verse</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="blogs.html">Blogs</a>
      <a href="learn.html">Learn</a>
      <a href="about.html">About Me</a>
    </div>
  </nav>

  <div class="admin-container">
    <div class="card visible">
      <h1 style="font-size: 2.5rem; margin-bottom: 1.5rem; text-align: center; background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        Admin Dashboard
      </h1>
      <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2.5rem;">
        Publish new financial insights and articles directly to FinVerse.
      </p>

      <!-- Auth Verification Section -->
      <div class="auth-section">
        <div class="form-group">
          <label for="adminToken"><i class="fa-solid fa-key" style="color: var(--secondary-color); margin-right: 8px;"></i> Admin Access Token</label>
          <input type="password" id="adminToken" class="input-field" placeholder="Enter your secret admin token" required>
          <div style="margin-top: 0.8rem; display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">
            <input type="checkbox" id="rememberToken" checked style="cursor: pointer; width: 16px; height: 16px;">
            <label for="rememberToken" style="margin: 0; text-transform: none; letter-spacing: normal; font-size: 0.95rem; cursor: pointer;">Remember token for this session</label>
          </div>
        </div>
      </div>

      <!-- Article Composition Form -->
      <form id="adminPublishForm">
        <div class="form-group">
          <label for="postTitle">Blog Post Title</label>
          <input type="text" id="postTitle" class="input-field" placeholder="e.g. The Global Commodities Surge: What To Expect" required>
        </div>

        <div class="form-group">
          <label for="postContent">Blog Content (HTML Tags Supported)</label>
          <textarea id="postContent" class="input-field" placeholder="Type your blog content here. You can use standard HTML tags like <strong>, <em>, <h3>, <br>, etc." required></textarea>
        </div>

        <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem; padding: 1.2rem;" id="publishBtn">
          <i class="fa-solid fa-paper-plane" style="margin-right: 8px;"></i> Publish Insight
        </button>
      </form>
    </div>

    <!-- Subscribers List Section -->
    <div class="card visible" style="margin-top: 3rem;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
        <h2 style="font-size: 1.8rem; background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
          Subscribers List
        </h2>
        <button id="refreshSubscribersBtn" class="btn" style="padding: 0.6rem 1.5rem; font-size: 0.9rem; border-radius: 8px;">
          <i class="fa-solid fa-rotate-right" style="margin-right: 5px;"></i> Refresh
        </button>
      </div>
      
      <div style="overflow-x: auto;">
        <table class="subscribers-table">
          <thead>
            <tr>
              <th style="width: 80px;">#</th>
              <th>Email Address</th>
              <th>Subscribed At</th>
            </tr>
          </thead>
          <tbody id="subscribersList">
            <tr>
              <td colspan="3" style="text-align: center; color: var(--text-secondary);">
                Enter Admin Access Token to load subscribers.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast">Message goes here</div>

  <script>
    // Dynamically resolve backend API origin
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') && window.location.port !== '8000'
      ? 'http://localhost:8000'
      : window.location.origin;

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      if(!toast) return;
      toast.innerText = message;
      toast.style.borderColor = isError ? 'var(--secondary-color)' : 'var(--primary-color)';
      toast.style.color = isError ? 'var(--secondary-color)' : 'var(--primary-color)';
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    async function fetchSubscribers() {
      const token = document.getElementById('adminToken').value.trim();
      const listContainer = document.getElementById('subscribersList');
      if (!listContainer) return;

      if (!token) {
        listContainer.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--text-secondary);">Enter Admin Access Token to load subscribers.</td></tr>';
        return;
      }

      listContainer.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--text-secondary);"><i class="fa-solid fa-circle-notch fa-spin" style="margin-right: 8px;"></i>Loading subscribers...</td></tr>';

      try {
        const response = await fetch(`${API_BASE}/subscribers/`, {
          method: 'GET',
          headers: {
            'X-Admin-Token': token
          }
        });

        if (response.ok) {
          const subscribers = await response.json();
          if (subscribers.length === 0) {
            listContainer.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--text-secondary);">No subscribers yet.</td></tr>';
            return;
          }
          listContainer.innerHTML = '';
          subscribers.forEach((sub, idx) => {
            const row = document.createElement('tr');
            const dateStr = new Date(sub.subscribed_at).toLocaleString();
            row.innerHTML = `
              <td style="color: var(--text-secondary); font-weight: 500;">${idx + 1}</td>
              <td style="font-weight: 600; color: var(--text-primary);">${sub.email}</td>
              <td style="color: var(--text-secondary);">${dateStr}</td>
            `;
            listContainer.appendChild(row);
          });
        } else {
          listContainer.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--secondary-color);">Failed to load subscribers. Check your Admin Token.</td></tr>';
        }
      } catch (err) {
        listContainer.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--secondary-color);">Network error loading subscribers.</td></tr>';
      }
    }

    // Load saved session token if exists
    document.addEventListener("DOMContentLoaded", () => {
      const savedToken = sessionStorage.getItem('adminToken');
      if (savedToken) {
        document.getElementById('adminToken').value = savedToken;
        fetchSubscribers();
      }

      const refreshBtn = document.getElementById('refreshSubscribersBtn');
      if (refreshBtn) {
        refreshBtn.addEventListener('click', fetchSubscribers);
      }

      const tokenInput = document.getElementById('adminToken');
      if (tokenInput) {
        tokenInput.addEventListener('change', fetchSubscribers);
      }
    });

    // Handle Publish submission
    const form = document.getElementById('adminPublishForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const title = document.getElementById('postTitle').value.trim();
      const content = document.getElementById('postContent').value.trim();
      const token = document.getElementById('adminToken').value.trim();
      const remember = document.getElementById('rememberToken').checked;
      
      if (!token) {
        showToast("Access Token is required to publish posts!", true);
        return;
      }

      const publishBtn = document.getElementById('publishBtn');
      publishBtn.disabled = true;
      publishBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin" style="margin-right: 8px;"></i> Publishing...';

      try {
        const response = await fetch(`${API_BASE}/posts/`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Admin-Token': token
          },
          body: JSON.stringify({ title, content })
        });

        if (response.ok) {
          const postData = await response.json();
          showToast("Successfully published! Subscribers notified.");
          form.reset();
          
          if (remember) {
            sessionStorage.setItem('adminToken', token);
          } else {
            sessionStorage.removeItem('adminToken');
          }
          
          // Re-populate token field after reset
          document.getElementById('adminToken').value = token;
        } else {
          const errData = await response.json();
          showToast(errData.detail || "Unauthorized! Please check your Admin Token.", true);
        }
      } catch (err) {
        showToast("Network Error: Could not connect to API server.", true);
      } finally {
        publishBtn.disabled = false;
        publishBtn.innerHTML = '<i class="fa-solid fa-paper-plane" style="margin-right: 8px;"></i> Publish Insight';
      }
    });
  </script>
</body>
</html>
