<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs | FinVerse</title>
  <link rel="stylesheet" href="styles.css?v=3">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Search & Filter Container */
    .controls-wrapper {
      max-width: 800px;
      margin: 2rem auto 3.5rem auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    
    .search-container {
      position: relative;
      width: 100%;
    }
    
    .search-container i {
      position: absolute;
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 1.2rem;
      pointer-events: none;
      transition: var(--transition);
    }
    
    .search-input {
      width: 100%;
      padding: 1.2rem 1.8rem 1.2rem 3.5rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      outline: none;
      transition: var(--transition);
      backdrop-filter: blur(10px);
    }
    
    .search-input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 20px rgba(188, 239, 204, 0.15);
      background: rgba(255, 255, 255, 0.04);
    }
    
    .search-input:focus + i {
      color: var(--primary-color);
    }

    /* Category Filter Pills */
    .categories-container {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    
    .category-pill {
      padding: 0.6rem 1.5rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      border-radius: 100px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      transition: var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .category-pill:hover {
      border-color: rgba(255, 255, 255, 0.2);
      color: var(--text-primary);
      transform: translateY(-2px);
    }
    
    .category-pill.active {
      background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
      color: #000;
      font-weight: 700;
      border-color: transparent;
      box-shadow: 0 5px 15px rgba(188, 239, 204, 0.25);
    }

    /* Skeleton Loading Cards */
    .skeleton-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 32px;
      padding: 3rem;
      position: relative;
      overflow: hidden;
      height: 350px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    .skeleton-line {
      height: 20px;
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 37%, rgba(255,255,255,0.03) 63%);
      background-size: 400% 100%;
      animation: skeleton-loading 1.4s ease infinite;
      border-radius: 4px;
    }
    
    .skeleton-title {
      width: 85%;
      height: 28px;
      margin-bottom: 1.2rem;
    }
    
    .skeleton-date {
      width: 30%;
      height: 16px;
      margin-bottom: 2rem;
    }
    
    .skeleton-text-1 { width: 95%; height: 16px; margin-bottom: 0.8rem; }
    .skeleton-text-2 { width: 90%; height: 16px; margin-bottom: 0.8rem; }
    .skeleton-text-3 { width: 60%; height: 16px; }
    
    .skeleton-btn {
      width: 40%;
      height: 20px;
      margin-top: 2rem;
      border-radius: 100px;
    }

    @keyframes skeleton-loading {
      0% { background-position: 100% 50%; }
      100% { background-position: 0 50%; }
    }

    /* Empty State View */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background: rgba(255, 255, 255, 0.01);
      border-radius: 32px;
      border: 1px dashed var(--glass-border);
      grid-column: 1 / -1;
      max-width: 600px;
      margin: 0 auto;
    }

    .empty-state i {
      font-size: 3.5rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }
    
    .empty-state h3 {
      font-size: 1.8rem;
      margin-bottom: 0.8rem;
      color: var(--text-primary);
    }
    
    .empty-state p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    /* Premium Blog Cards Layout overrides */
    .blog-card-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.2rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .blog-card-tag {
      padding: 0.2rem 0.8rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #000;
      background: var(--secondary-color);
      display: inline-block;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="brand" style="display: flex; align-items: center; gap: 15px;">
      <div class="logo-wrapper"></div>
      Fin<span>Verse</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="blogs.html" class="active">Blogs</a>
      <a href="learn.html">Learn</a>
      <a href="about.html">About Me</a>
      <div style="display: flex; gap: 0.8rem; margin-left: 1rem;">
        <a href="https://www.linkedin.com/in/samarth-yanjane-513295374?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank" class="social-icon linkedin" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
        <a href="https://www.instagram.com/finverse.zone/" target="_blank" class="social-icon instagram" title="Instagram"><i class="fa-brands fa-instagram"></i></a>

  </nav>

  <section style="margin-top: 50px;" id="blog-wrapper">
    <div id="blog-list-view">
      <h1 class="section-title">FinVerse Insights</h1>
      <p style="text-align: center; color: var(--text-secondary); font-size: 1.2rem; max-width: 600px; margin: -2rem auto 3rem auto; font-weight: 300; line-height: 1.6;">
        Expert market research, macroeconomic breakdowns, and trading ideas. Fully backed by institutional-grade metrics.
      </p>
      
      <!-- Search & Filters -->
      <div class="controls-wrapper">
        <div class="search-container">
          <input type="text" id="blogSearch" class="search-input" placeholder="Search insights by title or content...">

        <div class="categories-container" id="categoryFilters">

          <button class="category-pill" data-category="crypto">Crypto</button>
          <button class="category-pill" data-category="personal">Personal Finance</button>
        </div>
      </div>

      <!-- Grid for Articles -->
      <div class="grid" id="allPostsGrid">
        <!-- Skeleton Loaders -->
        <div class="skeleton-card">
          <div>
            <div class="skeleton-line skeleton-title"></div>
            <div class="skeleton-line skeleton-date"></div>
            <div class="skeleton-line skeleton-text-1"></div>
            <div class="skeleton-line skeleton-text-2"></div>
            <div class="skeleton-line skeleton-text-3"></div>
          </div>
          <div class="skeleton-line skeleton-btn"></div>
        </div>
        <div class="skeleton-card">
          <div>
            <div class="skeleton-line skeleton-title"></div>
            <div class="skeleton-line skeleton-date"></div>
            <div class="skeleton-line skeleton-text-1"></div>
            <div class="skeleton-line skeleton-text-2"></div>
            <div class="skeleton-line skeleton-text-3"></div>
          </div>
          <div class="skeleton-line skeleton-btn"></div>
        </div>
        <div class="skeleton-card">
          <div>
            <div class="skeleton-line skeleton-title"></div>
            <div class="skeleton-line skeleton-date"></div>
            <div class="skeleton-line skeleton-text-1"></div>
            <div class="skeleton-line skeleton-text-2"></div>
            <div class="skeleton-line skeleton-text-3"></div>
          </div>
          <div class="skeleton-line skeleton-btn"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="toast">Message goes here</div>

  <script src="app.js"></script>
</body>
</html>
